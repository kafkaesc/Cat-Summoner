name: Lint

on:
  push:
    branches:
      - aws
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # GitHub checkout clones the repo into the runner
      - uses: actions/checkout@v4
      # Install Node.js and cache npm dependencies
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Install dependencies via npm ci
      - run: npm ci
      # Run ESLint
      - run: npm run lint
